<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simba AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <% if (htmlWebpackPlugin.options.office) { %><script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script><% } else { %><meta name="theme-color" content="#d97757" /><link rel="manifest" href="/site.webmanifest" /><link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" /><link rel="icon" href="/assets/icon.svg" type="image/svg+xml" /><% } %>
  <!-- Self-contained splash styles: must work before the JS bundle injects the main CSS. -->
  <style id="splash-style">
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
      background: #faf9f5; transition: opacity .45s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    .splash-badge { position: relative; width: 86px; height: 86px; display: grid; place-items: center; animation: splashPop .6s cubic-bezier(0.34,1.56,0.64,1) both; }
    .splash-badge::before {
      content: ""; position: absolute; inset: -18px; border-radius: 50%;
      background: radial-gradient(circle, rgba(217,119,87,.22) 0%, rgba(217,119,87,0) 68%);
      animation: splashGlow 2s ease-in-out infinite;
    }
    .splash-badge img, .splash-badge svg { width: 58px; height: 58px; object-fit: contain; animation: splashBob 1.8s ease-in-out infinite; }
    .splash-ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 3px solid rgba(217,119,87,.18); border-top-color: #d97757;
      animation: splashSpin .9s linear infinite;
    }
    .splash-word {
      font-family: "Fraunces", Georgia, "Times New Roman", serif;
      font-size: 21px; font-weight: 600; letter-spacing: .01em;
      background: linear-gradient(90deg, #bdb5a6 30%, #2b2a27 50%, #bdb5a6 70%);
      background-size: 220% 100%; -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent; color: transparent;
      animation: splashShim 1.6s linear infinite;
    }
    @keyframes splashSpin { to { transform: rotate(360deg); } }
    @keyframes splashBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes splashShim { from { background-position: 220% 0; } to { background-position: -220% 0; } }
    @keyframes splashPop { from { opacity: 0; transform: scale(.6); } to { opacity: 1; transform: scale(1); } }
    @keyframes splashGlow { 0%,100% { opacity: .5; transform: scale(.92); } 50% { opacity: 1; transform: scale(1.08); } }
    @media (prefers-color-scheme: dark) {
      #splash { background: #201f1c; }
      .splash-word { background: linear-gradient(90deg, #5b554b 30%, #f2efe8 50%, #5b554b 70%); background-size: 220% 100%; -webkit-background-clip: text; background-clip: text; }
    }
    @media (prefers-reduced-motion: reduce) {
      .splash-badge, .splash-badge::before, .splash-badge img, .splash-ring, .splash-word { animation: none; }
    }
  </style>
</head>
<body>
  <div id="splash" role="status" aria-label="Laddar Simba">
    <div class="splash-badge">
      <span class="splash-ring"></span>
      <svg viewBox="0 0 80 80" aria-hidden="true" focusable="false">
        <g fill="#dd854b">
          <circle cx="40" cy="13" r="9"/><circle cx="55" cy="16" r="9"/><circle cx="65" cy="27" r="9"/>
          <circle cx="68" cy="41" r="9"/><circle cx="64" cy="55" r="9"/><circle cx="54" cy="64" r="9"/>
          <circle cx="40" cy="68" r="9"/><circle cx="26" cy="64" r="9"/><circle cx="16" cy="55" r="9"/>
          <circle cx="12" cy="41" r="9"/><circle cx="15" cy="27" r="9"/><circle cx="25" cy="16" r="9"/>
        </g>
        <g fill="#efa863">
          <circle cx="40" cy="18" r="8"/><circle cx="52" cy="21" r="8"/><circle cx="60" cy="30" r="8"/>
          <circle cx="62" cy="42" r="8"/><circle cx="58" cy="53" r="8"/><circle cx="49" cy="60" r="8"/>
          <circle cx="40" cy="62" r="8"/><circle cx="31" cy="60" r="8"/><circle cx="22" cy="53" r="8"/>
          <circle cx="18" cy="42" r="8"/><circle cx="20" cy="30" r="8"/><circle cx="28" cy="21" r="8"/>
        </g>
        <path d="M18 22 L24 6 L34 18 Z" fill="#cf7a42"/>
        <path d="M62 22 L56 6 L46 18 Z" fill="#cf7a42"/>
        <path d="M21 20 L24 10 L31 18 Z" fill="#f1bd8b"/>
        <path d="M59 20 L56 10 L49 18 Z" fill="#f1bd8b"/>
        <circle cx="40" cy="40" r="22" fill="#f6c891"/>
        <ellipse cx="40" cy="44" rx="17" ry="16" fill="#fdf4e7"/>
        <ellipse cx="25" cy="44" rx="4" ry="2.6" fill="#f3a39c" opacity=".55"/>
        <ellipse cx="55" cy="44" rx="4" ry="2.6" fill="#f3a39c" opacity=".55"/>
        <ellipse cx="31" cy="38" rx="4.2" ry="4.8" fill="#3a2a1e"/>
        <ellipse cx="49" cy="38" rx="4.2" ry="4.8" fill="#3a2a1e"/>
        <circle cx="32.6" cy="36.2" r="1.5" fill="#fff"/>
        <circle cx="50.6" cy="36.2" r="1.5" fill="#fff"/>
        <path d="M36.5 46 q3.5 3 7 0 q-1 3.1 -3.5 3.1 q-2.5 0 -3.5 -3.1 Z" fill="#41312a"/>
        <path d="M40 49 v2.2" stroke="#7a5a3a" stroke-width="1" stroke-linecap="round"/>
        <path d="M40 51.2 q-3 3 -6 1.2 M40 51.2 q3 3 6 1.2" stroke="#7a5a3a" stroke-width="1.1" fill="none" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="splash-word">Simba</div>
  </div>
  <aside id="sidebar" class="sidebar" hidden aria-label="Chattar">
    <div class="sb-top">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">S</span>
        <h1 class="sb-title">Simba AI</h1>
      </div>
      <button id="sb-new" class="sb-new" type="button">＋ Ny chatt</button>
    </div>
    <div id="sb-list" class="sb-list" aria-label="Sparade chattar"></div>
    <div class="sb-foot">
      <button id="sb-settings" class="sb-foot-btn" type="button">⚙ Inställningar</button>
    </div>
  </aside>

  <div id="app">
    <div id="chat-watermark" class="chat-watermark" aria-hidden="true"></div>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">S</span>
        <div class="brand-text">
          <h1>Simba AI</h1>
          <p id="context-pill" class="context-pill">Ingen markering</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="undo" class="icon-btn" title="Ångra Simbas senaste ändring" aria-label="Ångra" disabled>↶</button>
        <button id="agents" class="icon-btn" title="Agenter – specialiserade hjälpare" aria-label="Agenter">✦</button>
        <button id="settings" class="icon-btn" title="Inställningar" aria-label="Inställningar">⚙</button>
        <button id="new-chat" class="icon-btn" title="Ny chatt" aria-label="Ny chatt">＋</button>
      </div>
    </header>

    <main id="messages" class="messages" aria-live="polite">
      <div class="welcome">
        <h2>Hej 👋</h2>
        <p>Jag är Simba, din Excel-assistent. Jag kan läsa ditt ark, skriva formler, städa data och förklara vad som händer.</p>
        <div class="suggestions">
          <button class="suggestion">Sammanfatta det markerade området</button>
          <button class="suggestion">Skriv en formel som summerar kolumn B</button>
          <button class="suggestion">Hitta dubbletter i min data</button>
        </div>
      </div>
    </main>

    <footer class="composer">
      <div id="ask-dock" class="ask-dock" aria-live="polite"></div>
      <div id="agent-chip" class="agent-chip" hidden></div>
      <div id="attach-chip" class="attach-chip" hidden></div>
      <div class="composer-row">
        <button id="attach" class="attach-btn" title="Bifoga en fil (CSV, text, bild eller PDF)" aria-label="Bifoga fil">📎</button>
        <button id="cloud" class="attach-btn" title="Bläddra bland dina molnfiler (OneDrive/SharePoint)" aria-label="Molnfiler" hidden>☁</button>
        <input type="file" id="file-input" accept=".csv,.tsv,.txt,.md,.json,.tab,image/png,image/jpeg,image/gif,image/webp,application/pdf" hidden />
        <textarea id="prompt" rows="1" placeholder="Fråga Simba om ditt kalkylark…"></textarea>
        <button id="send" class="send-btn" title="Skicka" aria-label="Skicka">➤</button>
      </div>
      <div class="composer-foot">
        <span class="foot-label">Redigering</span>
        <div class="seg" id="edit-mode" role="group" aria-label="Läge för arkredigering">
          <button class="seg-btn" data-mode="auto" title="Tillämpa ändringar automatiskt">Auto</button>
          <button class="seg-btn active" data-mode="ask" title="Fråga före varje ändring">Fråga</button>
          <button class="seg-btn" data-mode="off" title="Redigera aldrig arket">Av</button>
        </div>
      </div>
    </footer>
  </div>

  <!-- Popups -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div id="modal-card" class="modal-card" role="dialog" aria-modal="true"></div>
  </div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

</body>
</html>
