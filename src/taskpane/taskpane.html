<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simba AI</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">S</span>
        <div class="brand-text">
          <h1>Simba AI</h1>
          <p id="context-pill" class="context-pill">No selection</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="settings" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
        <button id="new-chat" class="icon-btn" title="New chat" aria-label="New chat">＋</button>
      </div>
    </header>

    <main id="messages" class="messages" aria-live="polite">
      <div class="welcome">
        <h2>Hello 👋</h2>
        <p>I'm Simba, your Excel assistant. I can read your sheet, write formulas, clean data, and explain what's going on.</p>
        <div class="suggestions">
          <button class="suggestion">Summarize the selected range</button>
          <button class="suggestion">Write a formula to total column B</button>
          <button class="suggestion">Find duplicates in my data</button>
        </div>
      </div>
    </main>

    <footer class="composer">
      <div class="composer-row">
        <textarea id="prompt" rows="1" placeholder="Ask Simba about your spreadsheet…"></textarea>
        <button id="send" class="send-btn" title="Send" aria-label="Send">➤</button>
      </div>
      <div class="composer-foot">
        <span class="foot-label">Sheet editing</span>
        <div class="seg" id="edit-mode" role="group" aria-label="Sheet editing mode">
          <button class="seg-btn" data-mode="auto" title="Apply edits automatically">Auto</button>
          <button class="seg-btn active" data-mode="ask" title="Ask before each edit">Ask</button>
          <button class="seg-btn" data-mode="off" title="Never edit the sheet">Off</button>
        </div>
      </div>
    </footer>
  </div>

  <!-- Popups -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div id="modal-card" class="modal-card" role="dialog" aria-modal="true"></div>
  </div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="taskpane.js"></script>
</body>
</html>
