<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simba AI</title>
  <script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">S</span>
        <div class="brand-text">
          <h1>Simba AI</h1>
          <p id="context-pill" class="context-pill">Ingen markering</p>
        </div>
      </div>
      <div class="header-actions">
        <button id="settings" class="icon-btn" title="Inställningar" aria-label="Inställningar">⚙</button>
        <button id="new-chat" class="icon-btn" title="Ny chatt" aria-label="Ny chatt">＋</button>
      </div>
    </header>

    <main id="messages" class="messages" aria-live="polite">
      <div class="welcome">
        <h2>Hej 👋</h2>
        <p>Jag är Simba, din Excel-assistent. Jag kan läsa ditt ark, skriva formler, städa data och förklara vad som händer.</p>
        <div class="suggestions">
          <button class="suggestion">Sammanfatta det markerade området</button>
          <button class="suggestion">Skriv en formel som summerar kolumn B</button>
          <button class="suggestion">Hitta dubbletter i min data</button>
        </div>
      </div>
    </main>

    <footer class="composer">
      <div class="composer-row">
        <textarea id="prompt" rows="1" placeholder="Fråga Simba om ditt kalkylark…"></textarea>
        <button id="send" class="send-btn" title="Skicka" aria-label="Skicka">➤</button>
      </div>
      <div class="composer-foot">
        <span class="foot-label">Redigering</span>
        <div class="seg" id="edit-mode" role="group" aria-label="Läge för arkredigering">
          <button class="seg-btn" data-mode="auto" title="Tillämpa ändringar automatiskt">Auto</button>
          <button class="seg-btn active" data-mode="ask" title="Fråga före varje ändring">Fråga</button>
          <button class="seg-btn" data-mode="off" title="Redigera aldrig arket">Av</button>
        </div>
      </div>
    </footer>
  </div>

  <!-- Popups -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div id="modal-card" class="modal-card" role="dialog" aria-modal="true"></div>
  </div>
  <div id="toast-container" class="toast-container" aria-live="polite"></div>

  <script src="taskpane.js"></script>
</body>
</html>
